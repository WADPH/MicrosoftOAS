<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OAS Progress</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="icon" type="image/png" href="/images/favicon.png" />
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <div class="topbarLeft">
          <h1 class="topbarBrand">
            <img class="logoLight" src="/images/oas-light.png" alt="OAS" />
            <img class="logoDark" src="/images/oas.png" alt="OAS" />
          </h1>
        </div>
        <div class="topbarRight">
          <div class="toolbarGroup">
            <button id="backToMainBtn" class="ghost small" type="button">Back</button>
            <div class="toolbarLabel">Theme</div>
            <button id="themeBtn" class="iconBtn" type="button" aria-label="Toggle theme" title="Toggle theme">
              <span class="icon sun" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M12 18a6 6 0 1 0 0-12 6 6 0 0 0 0 12Z" />
                  <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
                </svg>
              </span>
              <span class="icon moon" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.5 6.5 0 0 0 9.8 9.8Z" />
                </svg>
              </span>
            </button>
          </div>
        </div>
      </div>

      <section class="progressScreen" aria-live="polite">
        <div class="progressCard">
          <h2>Onboarding Progress</h2>
          
          <div class="assetStatusLegend">
            <div class="legendTitle">Asset Delivery Status:</div>
            <div class="legendItems">
              <div class="legendItem">
                <span class="legendDot pending"></span>
                <span class="legendLabel">Pending - Asset not yet delivered</span>
              </div>
              <div class="legendItem">
                <span class="legendDot delivered"></span>
                <span class="legendLabel">Delivered - Asset has arrived</span>
              </div>
            </div>
            <div id="editableNotice" class="legendNote hidden">
              💡 Click on an asset name to toggle its delivery status
            </div>
          </div>
          
          <div id="progressList" class="progressList"></div>
        </div>
      </section>
    </div>
    <script src="/progress.js"></script>
  </body>
</html>
